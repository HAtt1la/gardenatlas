<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d5a27"/>
      <stop offset="100%" stop-color="#4a7c43"/>
    </linearGradient>
    <linearGradient id="page-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8e6c9"/>
      <stop offset="100%" stop-color="#e8f5e9"/>
    </linearGradient>
    <linearGradient id="page-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>

  <!-- Book left cover -->
  <path d="M18 28 Q18 24 22 24 L48 24 L48 68 L22 68 Q18 68 18 64 Z" fill="#5d8a56"/>
  <!-- Book right cover -->
  <path d="M52 24 L78 24 Q82 24 82 28 L82 64 Q82 68 78 68 L52 68 Z" fill="#4a7040"/>
  <!-- Book spine -->
  <rect x="46" y="22" width="8" height="48" rx="2" fill="#3a5c35"/>

  <!-- Left page -->
  <path d="M22 27 L47 27 L47 65 L22 65 Q20 65 20 63 L20 29 Q20 27 22 27 Z" fill="url(#page-left)"/>
  <!-- Right page -->
  <path d="M53 27 L78 27 Q80 27 80 29 L80 63 Q80 65 78 65 L53 65 Z" fill="url(#page-right)"/>

  <!-- Left page lines -->
  <line x1="25" y1="35" x2="44" y2="35" stroke="#a5c8a0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="41" x2="44" y2="41" stroke="#a5c8a0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="47" x2="44" y2="47" stroke="#a5c8a0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="53" x2="38" y2="53" stroke="#a5c8a0" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right page: simple map grid suggestion -->
  <line x1="56" y1="35" x2="77" y2="35" stroke="#a5c8a0" stroke-width="1" stroke-linecap="round"/>
  <line x1="56" y1="47" x2="77" y2="47" stroke="#a5c8a0" stroke-width="1" stroke-linecap="round"/>
  <line x1="56" y1="59" x2="77" y2="59" stroke="#a5c8a0" stroke-width="1" stroke-linecap="round"/>
  <line x1="63" y1="32" x2="63" y2="62" stroke="#a5c8a0" stroke-width="1" stroke-linecap="round"/>
  <line x1="70" y1="32" x2="70" y2="62" stroke="#a5c8a0" stroke-width="1" stroke-linecap="round"/>
  <!-- Map pin dot on right page -->
  <circle cx="66" cy="43" r="3.5" fill="#2d5a27" opacity="0.7"/>
  <circle cx="66" cy="43" r="1.5" fill="white" opacity="0.9"/>

  <!-- Stem growing from spine bottom -->
  <line x1="50" y1="68" x2="50" y2="80" stroke="#6aaa2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Left leaf -->
  <path d="M50 76 Q40 70 38 60 Q48 63 50 74" fill="#6aaa2a"/>
  <!-- Right leaf -->
  <path d="M50 72 Q60 66 62 56 Q52 59 50 70" fill="#88cc44"/>
  <!-- Top bud -->
  <path d="M50 80 Q46 73 50 68 Q54 73 50 80" fill="#a8d5a2"/>
</svg>
